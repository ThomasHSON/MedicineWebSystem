<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <title>藥品亮燈 API 監控</title>
  <link rel="stylesheet" href="style.css?v=1.0" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-title">
        <h1>藥品亮燈 API 效能監控</h1>
        <p class="subtitle">追蹤 light_on_by_code API 效能</p>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn btn-primary">刷新數據</button>
        <button id="clearBtn" class="btn btn-danger">清除所有</button>
      </div>
    </header>

    <!-- Test Light Panel -->
    <section class="test-light-section">
      <div class="test-light-header" id="testLightHeader">
        <h2>亮燈測試</h2>
        <span class="collapse-icon" id="collapseIcon">▼</span>
      </div>
      <div class="test-light-content" id="testLightContent">
        <div class="test-light-form">
          <div class="form-group">
            <label for="pharmacy">請選擇藥局:</label>
            <select id="pharmacy">
              <option value="">-- 請先選擇藥局 --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="serverName">調劑台名稱:</label>
            <select id="serverName">
              <option value="">-- 請先選擇藥局 --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="lightCodeInput">藥品碼:</label>
            <div class="light-code-search-container">
              <input
                type="text"
                id="lightCodeInput"
                placeholder="輸入藥品代碼或名稱搜尋，點擊結果新增"
                class="light-code-search-input"
              />
              <div id="lightCodeSuggestions" class="light-code-suggestions" style="display: none;">
                <!-- 提示列表會動態插入此處 -->
              </div>
            </div>
            <div id="lightCodeTags" class="light-code-tags">
              <!-- 已選擇的藥品碼會顯示在此 -->
            </div>
          </div>
          <div class="form-group">
            <label>亮燈顏色:</label>
            <div class="color-buttons-group">
              <button type="button" class="color-btn" data-color="255,0,0" data-name="紅">紅</button>
              <button type="button" class="color-btn" data-color="0,0,255" data-name="藍">藍</button>
              <button type="button" class="color-btn" data-color="0,255,0" data-name="綠">綠</button>
              <button type="button" class="color-btn" data-color="255,255,255" data-name="白">白</button>
            </div>
            <input type="hidden" id="lightColor" value="255,0,0" />
          </div>
          <div class="form-group">
            <label for="lightDuration">持續秒數:</label>
            <input type="number" id="lightDuration" value="180" min="1" />
          </div>
          <div class="form-actions">
            <button id="testLightOnBtn" class="btn btn-success">亮燈</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Statistics -->
    <section class="stats-section">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">總調用數</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">成功</div>
          <div class="stat-value success" id="successCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">失敗</div>
          <div class="stat-value failed" id="failedCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均前端耗時</div>
          <div class="stat-value" id="avgFrontendTime">0 ms</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">平均額外耗時</div>
          <div class="stat-value" id="avgExtraTime">0 ms</div>
        </div>
      </div>
    </section>

    <!-- Logs List -->
    <section class="logs-section">
      <div class="logs-header">
        <h2>API 調用記錄</h2>
        <span class="logs-count" id="logsCount">共 0 筆</span>
      </div>

      <div id="logsList" class="logs-list">
        <!-- Logs will be inserted here -->
      </div>

      <div id="emptyState" class="empty-state">
        <p>暫無監控數據</p>
        <small>打開藥師操作界面並觸發亮燈功能，數據會自動出現在這裡</small>
      </div>
    </section>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">API 調用詳情</h2>
        <button id="closeModal" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="detail-section">
          <h3>基本信息</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <label>觸發時間:</label>
              <span id="detailSendTime">-</span>
            </div>
            <div class="detail-item">
              <label>接收時間:</label>
              <span id="detailReceiveTime">-</span>
            </div>
            <div class="detail-item">
              <label>前端總耗時:</label>
              <span id="detailFrontendDuration">-</span>
            </div>
            <div class="detail-item">
              <label>API 處理耗時:</label>
              <span id="detailApiDuration">-</span>
            </div>
            <div class="detail-item">
              <label>前端額外耗時:</label>
              <span id="detailExtraDuration">-</span>
            </div>
            <div class="detail-item">
              <label>狀態:</label>
              <span id="detailStatus">-</span>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <h3>請求 Payload</h3>
          <pre id="detailPayload" class="code-block">-</pre>
        </div>

        <div class="detail-section">
          <h3>回應 Response</h3>
          <pre id="detailResponse" class="code-block">-</pre>
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" class="btn btn-secondary">關閉</button>
      </div>
    </div>
  </div>

  <script src="../../ApiURL.js?v=1.0"></script>
  <script src="../../Function/Basic.js?v=1.0"></script>
  <script src="api_monitor.js?v=1.0"></script>
  <script src="../api/med_cart_api.js?v=1.0"></script>
  <script src="app.js?v=1.0"></script>
  <script>
    window.apiInitialized = false;

    (async function() {
      try {
        console.log("[Monitor] 開始初始化 API 配置...");

        APIServer = await LoadAPIServer(true);
        console.log("[Monitor] LoadAPIServer 完成");

        const serverName = "";
        const API01 = serch_APIServer(serverName, "網頁", "API01");
        const API02 = serch_APIServer(serverName, "網頁", "API02");
        console.log("[Monitor] API01:", API01);
        console.log("[Monitor] API02:", API02);

        if (API01 && API01.length > 0 && API02 && API02.length > 0) {
          console.log("[Monitor] 開始檢查 IP 連接...");
          await check_ip(API01[0].server, API02[0].server);
          console.log("[Monitor] API 地址已設置，api_ip:", api_ip);
          console.log("[Monitor] device_url:", device_url);
        } else {
          console.warn("[Monitor] 無法找到 API01 或 API02 配置");
          console.log("[Monitor] 使用預設 api_ip:", api_ip);
        }

        // 標記初始化完成
        window.apiInitialized = true;
        console.log("[Monitor] API 初始化完成");
      } catch (error) {
        console.error("[Monitor] API 初始化失敗:", error);
        console.log("[Monitor] 使用預設 api_ip:", api_ip);
        window.apiInitialized = true;
      }
    })();
  </script>
</body>
</html>
